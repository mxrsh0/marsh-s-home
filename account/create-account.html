<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Create Account | Marsh's Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(135deg,
#050914,
#091a36,
#071220);

color:white;

overflow:hidden;

}

.background{

position:fixed;

width:100%;
height:100%;

background:

radial-gradient(circle at top left,
rgba(77,177,255,.18),
transparent 45%),

radial-gradient(circle at bottom right,
rgba(77,177,255,.12),
transparent 45%);

z-index:-1;

}

.card{

width:470px;

padding:45px;

border-radius:28px;

background:rgba(13,23,44,.78);

backdrop-filter:blur(20px);

border:1px solid rgba(77,177,255,.18);

box-shadow:
0 20px 60px rgba(0,0,0,.45),
0 0 35px rgba(77,177,255,.08);

}

.logo{

text-align:center;

font-size:2.2rem;

font-weight:700;

color:#4db1ff;

margin-bottom:8px;

}

.subtitle{

text-align:center;

opacity:.8;

margin-bottom:35px;

line-height:1.7;

}

.field{

margin-bottom:22px;

}

.field label{

display:block;

margin-bottom:8px;

font-size:.95rem;

opacity:.85;

}

.field input{

width:100%;

padding:15px 18px;

border:none;

outline:none;

border-radius:14px;

background:#132241;

color:white;

font-size:1rem;

border:1px solid rgba(77,177,255,.12);

transition:.25s;

}

.field input:focus{

border-color:#4db1ff;

box-shadow:0 0 15px rgba(77,177,255,.3);

}

.button{

width:100%;

padding:16px;

border:none;

border-radius:16px;

background:#4db1ff;

color:#071220;

font-weight:700;

font-size:1rem;

cursor:pointer;

transition:.25s;

margin-top:10px;

}

.button:hover{

transform:translateY(-2px);

box-shadow:0 10px 25px rgba(77,177,255,.35);

}

.notice{

margin-top:30px;

padding:18px;

border-radius:16px;

background:rgba(77,177,255,.08);

border:1px solid rgba(77,177,255,.12);

font-size:.9rem;

line-height:1.8;

opacity:.9;

}

.footer{

margin-top:30px;

text-align:center;

font-size:.9rem;

opacity:.75;

}

.footer a{

color:#4db1ff;

text-decoration:none;

}

</style>

</head>

<body>

<div class="background"></div>

<div class="card">

<div class="logo">

Marsh's Home

</div>

<p class="subtitle">

Create your private account.<br>

Nothing is stored on our servers.

</p>

<div class="field">

<label>

Username

</label>

<input
id="username"
type="text"
placeholder="Choose a username">

</div>

<div class="field">

<label>

Password

</label>

<input
id="password"
type="password"
placeholder="Create a password">

</div>

<div class="field">

<label>

Confirm Password

</label>

<input
id="confirmPassword"
type="password"
placeholder="Confirm your password">

</div>

<button
class="button"
id="createAccount">

Create Account

</button>

<div class="notice">

<b>Privacy First</b><br><br>

Your account lives only on this device.

No email address.

No password recovery.

No tracking.

No personal information is ever sent to Marsh's Home.

</div>

<div class="footer">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

<!-- PART 2 STARTS BELOW -->
<script src="../js/storage.js"></script>

<script>

document
.getElementById("createAccount")
.addEventListener("click", createAccount);

function createAccount(){

    const username =
    document.getElementById("username")
    .value
    .trim();

    const password =
    document.getElementById("password")
    .value;

    const confirm =
    document.getElementById("confirmPassword")
    .value;

    if(username===""){

        alert("Please enter a username.");

        return;

    }

    if(password.length<4){

        alert("Password must be at least 4 characters.");

        return;

    }

    if(password!==confirm){

        alert("Passwords do not match.");

        return;

    }

    const data = getStorage();

    if(data.account){

        alert("An account already exists on this device.");

        return;

    }

    data.account = {

        username: username,

        password: password,

        created: new Date().toLocaleDateString(),

        profile:{

            avatar:"default"

        },

        continueWatching:[],

        favourites:[],

        history:[],

        achievements:[],

        stats:{

            minutesWatched:0,

            moviesCompleted:0,

            episodesCompleted:0

        }

    };

    saveStorage(data);

    alert("Account created successfully!");

    window.location.href="../index.html";

}

</script>

</body>

</html>
