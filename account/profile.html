<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile | Marsh's Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(135deg,
#050914,
#091a36,
#071220);

color:white;

padding:50px 20px;

}

.container{

max-width:900px;

margin:auto;

}

.header{

text-align:center;

margin-bottom:40px;

}

.header h1{

font-size:2.8rem;

color:#4db1ff;

margin-bottom:10px;

}

.header p{

opacity:.75;

}

.profileCard{

background:rgba(13,23,44,.8);

border:1px solid rgba(77,177,255,.18);

border-radius:24px;

padding:40px;

backdrop-filter:blur(18px);

box-shadow:
0 20px 60px rgba(0,0,0,.4);

margin-bottom:30px;

}

.username{

font-size:2rem;

font-weight:700;

margin-bottom:8px;

}

.joined{

opacity:.7;

margin-bottom:35px;

}

.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:20px;

margin-bottom:35px;

}

.stat{

background:#132241;

padding:25px;

border-radius:18px;

text-align:center;

border:1px solid rgba(77,177,255,.12);

}

.stat h2{

font-size:2rem;

color:#4db1ff;

margin-bottom:8px;

}

.stat p{

opacity:.8;

}

.section{

background:#132241;

padding:30px;

border-radius:20px;

border:1px solid rgba(77,177,255,.12);

margin-bottom:25px;

}

.section h2{

margin-bottom:20px;

}

.placeholder{

opacity:.65;

line-height:1.8;

}

.buttons{

display:flex;

gap:20px;

flex-wrap:wrap;

margin-top:35px;

}

.button{

flex:1;

text-align:center;

padding:15px;

border-radius:16px;

text-decoration:none;

font-weight:600;

transition:.25s;

}

.home{

background:#4db1ff;

color:#071220;

}

.logout{

background:#182b4d;

color:white;

}

.button:hover{

transform:translateY(-2px);

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>My Profile</h1>

<p>

Your Marsh's Home account

</p>

</div>

<div class="profileCard">

<div
class="username"
id="username">

Loading...

</div>

<div
class="joined"
id="joined">

Loading...

</div>

<div class="stats">

<div class="stat">

<h2 id="minutes">

0

</h2>

<p>

Minutes Watched

</p>

</div>

<div class="stat">

<h2 id="movies">

0

</h2>

<p>

Movies Completed

</p>

</div>

<div class="stat">

<h2 id="episodes">

0

</h2>

<p>

Episodes Completed

</p>

</div>

</div>

<div class="section">

<h2>

Continue Watching

</h2>

<p class="placeholder">

Nothing here yet...

Start watching something and it'll appear here.

</p>

</div>

<div class="section">

<h2>

Achievements

</h2>

<p class="placeholder">

Achievements coming soon.

</p>

</div>

<div class="buttons">

<a
href="../index.html"
class="button home">

Home

</a>

<a
href="#"
id="logoutButton"
class="button logout">

Logout

</a>

</div>

</div>

<!-- PART 2 STARTS BELOW -->
<script src="../js/storage.js"></script>

<script>

const data = getStorage();

/* --------------------------
   Check login
-------------------------- */

const loggedIn =
localStorage.getItem("marsh_logged_in");

if(loggedIn !== "true"){

    window.location.href="login.html";

}

/* --------------------------
   Load account
-------------------------- */

const account = data.account;

document.getElementById("username")
.textContent = account.username;

document.getElementById("joined")
.textContent =
"Member since " + account.created;

/* --------------------------
   Load statistics
-------------------------- */

document.getElementById("minutes")
.textContent =
account.stats.minutesWatched;

document.getElementById("movies")
.textContent =
account.stats.moviesCompleted;

document.getElementById("episodes")
.textContent =
account.stats.episodesCompleted;

/* --------------------------
   Logout
-------------------------- */

document
.getElementById("logoutButton")
.addEventListener("click", logout);

function logout(){

    localStorage.removeItem(
        "marsh_logged_in"
    );

    localStorage.removeItem(
        "marsh_current_user"
    );

    window.location.href="login.html";

}

</script>

</body>

</html>
